name: Tuya → Supabase (voltaje cada 5 minutos)

# El script se ejecuta cada 3 horas y se queda abierto durante 1 hora completa,
# tomando una lectura real de voltaje cada 5 minutos (12 ciclos en total).
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

concurrency:
  group: tuya-voltage
  cancel-in-progress: false

jobs:
  read-voltage:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Read & push voltage (Bucle largo de 1 hora)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          TUYA_CLIENT_ID: ${{ secrets.TUYA_CLIENT_ID }}
          TUYA_CLIENT_SECRET: ${{ secrets.TUYA_CLIENT_SECRET }}
          TUYA_DEVICE_ID: ${{ secrets.TUYA_DEVICE_ID }}
          TUYA_REGION: ${{ secrets.TUYA_REGION }}
        run: |
          python script_tuya.py
