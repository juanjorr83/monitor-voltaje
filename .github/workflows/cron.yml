name: Tuya → Supabase (voltaje cada 10 minutos)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: tuya-voltage
  cancel-in-progress: false

jobs:
  read-voltage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Read & push voltage (Una única lectura rápida)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          TUYA_CLIENT_ID: ${{ secrets.TUYA_CLIENT_ID }}
          TUYA_CLIENT_SECRET: ${{ secrets.TUYA_CLIENT_SECRET }}
          TUYA_DEVICE_ID: ${{ secrets.TUYA_DEVICE_ID }}
          TUYA_REGION: ${{ secrets.TUYA_REGION }}
        run: python script_tuya.py
